<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leituras — A tua biblioteca pessoal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="manifest" href="data:application/json,{
  &quot;name&quot;:&quot;Leituras&quot;,
  &quot;short_name&quot;:&quot;Leituras&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#0e0c09&quot;,
  &quot;theme_color&quot;:&quot;#c8a96e&quot;
}">

<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0c09;
    --bg2:       #171410;
    --surface:   #1f1b15;
    --border:    #2e2820;
    --gold:      #c8a96e;
    --gold-dim:  #8a6f3e;
    --text:      #e8dfc8;
    --muted:     #7a6e5a;
    --danger:    #c05a4a;
    --ff-serif:  'Playfair Display', Georgia, serif;
    --ff-sans:   'DM Sans', sans-serif;
    --radius:    14px;
    --nav-h:     68px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--ff-sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== VIEWS ===== */
  .view { display: none; padding: 1.4rem 1.2rem calc(var(--nav-h) + 1.4rem); min-height: 100vh; animation: fadeUp .3s ease; }
  .view.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== TYPOGRAPHY ===== */
  h1 { font-family: var(--ff-serif); font-size: 2rem; font-weight: 700; color: var(--gold); letter-spacing: -.01em; margin-bottom: .2rem; }
  h2 { font-family: var(--ff-serif); font-size: 1.5rem; font-weight: 500; color: var(--text); margin-bottom: 1rem; }
  h3 { font-family: var(--ff-sans); font-size: .7rem; font-weight: 500; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 1.4rem 0 .7rem; }

  /* ===== CARD ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    margin-bottom: .75rem;
    transition: border-color .2s, transform .15s;
  }
  .card:hover { border-color: var(--gold-dim); transform: translateY(-1px); }
  .card-title { font-family: var(--ff-serif); font-size: 1.05rem; font-weight: 500; color: var(--text); margin-bottom: .15rem; }
  .card-author { font-size: .82rem; color: var(--muted); margin-bottom: .75rem; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .75rem; }

  /* ===== PROGRESS ===== */
  .progress-wrap { position: relative; background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 99px; transition: width .5s cubic-bezier(.22,1,.36,1); }
  .pct { font-size: .75rem; font-weight: 500; color: var(--gold); }

  /* ===== INPUTS ===== */
  .field { margin-bottom: .6rem; }
  .field label { display: block; font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .3rem; }
  input[type="text"], input[type="number"], input[type="password"] {
    width: 100%;
    padding: .65rem .85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--ff-sans);
    font-size: .9rem;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--gold-dim); }
  input::placeholder { color: var(--muted); }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
    padding: .65rem 1.2rem;
    border: none; border-radius: 10px;
    font-family: var(--ff-sans); font-size: .88rem; font-weight: 500;
    cursor: pointer; transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); opacity: .85; }
  .btn-primary { background: var(--gold); color: #0e0c09; }
  .btn-ghost   { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-danger  { background: transparent; color: var(--danger); border: 1px solid var(--danger)22; font-size: .78rem; padding: .35rem .7rem; border-radius: 7px; }
  .btn-block   { width: 100%; }
  .btn-sm      { padding: .4rem .9rem; font-size: .8rem; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 0 .5rem;
    z-index: 100;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: .22rem;
    background: none; border: none; color: var(--muted);
    font-family: var(--ff-sans); font-size: .62rem; text-transform: uppercase; letter-spacing: .08em;
    cursor: pointer; padding: .5rem .8rem; border-radius: 10px;
    transition: color .2s, background .2s;
  }
  .nav-btn span.icon { font-size: 1.3rem; }
  .nav-btn.active { color: var(--gold); background: #c8a96e12; }

  /* ===== LOGIN ===== */
  #login { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
  .login-box { width: 100%; max-width: 340px; }
  .login-logo { font-family: var(--ff-serif); font-size: 2.4rem; font-style: italic; color: var(--gold); text-align: center; margin-bottom: .3rem; }
  .login-sub  { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 2rem; }

  /* ===== STATS ===== */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1.2rem; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .stat-val  { font-family: var(--ff-serif); font-size: 1.8rem; color: var(--gold); }
  .stat-label{ font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-top: .1rem; }

  canvas { border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); width: 100% !important; }

  /* ===== GOAL ===== */
  .goal-track { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; margin-top: 1rem; }
  .goal-ratio { font-family: var(--ff-serif); font-size: 2.5rem; color: var(--gold); margin-bottom: .3rem; }
  .goal-desc  { font-size: .82rem; color: var(--muted); }

  /* ===== EMPTY STATE ===== */
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
  .empty .emoji { font-size: 2.5rem; margin-bottom: .7rem; }

  /* ===== SEARCH BAR ===== */
  .search-wrap { position: relative; margin-bottom: 1.2rem; }
  .search-wrap input { padding-left: 2.4rem; }
  .search-icon { position: absolute; left: .85rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .9rem; pointer-events: none; }

  /* ===== UPDATE MODAL ===== */
  .modal-overlay { display: none; position: fixed; inset: 0; background: #0009; z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem; width: 100%; max-width: 500px; animation: slideUp .25s ease; }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { margin-bottom: 1rem; }

  /* ===== DIVIDER ===== */
  hr { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login" class="view active">
  <div class="login-box">
    <div class="login-logo">Leituras</div>
    <div class="login-sub">A tua biblioteca pessoal</div>
    <div class="field">
      <label>Utilizador</label>
      <input type="text" id="user" placeholder="O teu nome">
    </div>
    <button class="btn btn-primary btn-block" onclick="login()">Entrar →</button>
  </div>
</div>

<!-- ===== BIBLIOTECA ===== -->
<div id="app" class="view">
  <h1>Biblioteca</h1>
  <p id="greeting" style="color:var(--muted);font-size:.85rem;margin-bottom:1.2rem"></p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Pesquisar livros...">
  </div>

  <div id="books"></div>

  <h3>Adicionar livro</h3>
  <div class="card">
    <div class="field"><label>Título</label><input type="text" id="title" placeholder="ex: O Nome da Rosa"></div>
    <div class="field"><label>Autor</label><input type="text" id="author" placeholder="ex: Umberto Eco"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
      <div class="field"><label>Total páginas</label><input type="number" id="pages" placeholder="320"></div>
      <div class="field"><label>Página atual</label><input type="number" id="current" placeholder="0"></div>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:.4rem" onclick="add()">Adicionar à biblioteca</button>
  </div>
</div>

<!-- ===== ESTATÍSTICAS ===== -->
<div id="stats" class="view">
  <h1>Estatísticas</h1>
  <div class="stats-grid" id="statsGrid"></div>
  <h3>Páginas por livro</h3>
  <canvas id="chart" height="140"></canvas>
</div>

<!-- ===== METAS ===== -->
<div id="goals" class="view">
  <h1>Metas</h1>
  <div class="card">
    <div class="field"><label>Meta semanal (livros)</label><input type="number" id="goal" placeholder="ex: 2"></div>
    <button class="btn btn-primary btn-block" onclick="setGoal()">Guardar meta</button>
  </div>
  <div class="goal-track" id="goalTrack"></div>
</div>

<!-- ===== MODAL ATUALIZAR PROGRESSO ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Atualizar progresso</h2>
    <div class="field"><label>Página atual</label><input type="number" id="modalPage" placeholder="0"></div>
    <div style="display:flex;gap:.6rem;margin-top:.4rem">
      <button class="btn btn-primary" style="flex:1" onclick="saveUpdate()">Guardar</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ===== NAV ===== -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-app" onclick="show('app')">
    <span class="icon">📚</span>Biblioteca
  </button>
  <button class="nav-btn" id="nav-stats" onclick="show('stats')">
    <span class="icon">📊</span>Stats
  </button>
  <button class="nav-btn" id="nav-goals" onclick="show('goals')">
    <span class="icon">🎯</span>Meta
  </button>
</nav>

<script>
// ===== STATE =====
let db = {};
let currentUser = "";
let editingIndex = -1;

// ===== LOGIN =====
function login() {
  const u = document.getElementById('user').value.trim();
  if (!u) return;
  currentUser = u;
  db = JSON.parse(localStorage.getItem("leituras-" + currentUser) || '{"books":[],"stats":{"streak":0,"last":null},"goal":2}');
  document.getElementById('login').classList.remove('active');
  show('app');
  updateStreak();
  render();
  updateStats();
  document.getElementById('greeting').textContent = "Bem-vindo/a, " + currentUser + " 👋";
}

// ===== SAVE =====
function save() {
  localStorage.setItem("leituras-" + currentUser, JSON.stringify(db));
}

// ===== NAVIGATION =====
function show(v) {
  document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
  document.getElementById(v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + v);
  if (btn) btn.classList.add('active');
  if (v === 'stats') { updateStats(); }
  if (v === 'goals') { updateGoal(); }
}

// ===== ADD BOOK =====
function add() {
  const t = document.getElementById('title').value.trim();
  if (!t) return;
  db.books.push({
    title: t,
    author: document.getElementById('author').value.trim(),
    pages: +document.getElementById('pages').value || 0,
    current: +document.getElementById('current').value || 0,
    added: new Date().toISOString()
  });
  document.getElementById('title').value = '';
  document.getElementById('author').value = '';
  document.getElementById('pages').value = '';
  document.getElementById('current').value = '';
  save();
  render();
  updateStats();
}

// ===== RENDER BOOKS =====
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('books');
  const filtered = db.books.map((b, i) => ({ ...b, _i: i }))
                            .filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));

  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="emoji">📖</div>${q ? 'Nenhum resultado.' : 'A tua biblioteca está vazia.<br>Adiciona o primeiro livro!'}</div>`;
    return;
  }

  container.innerHTML = filtered.map(b => {
    const pct = b.pages ? Math.round(b.current / b.pages * 100) : 0;
    const done = pct >= 100;
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="card-title">${esc(b.title)}${done ? ' ✅' : ''}</div>
          <div class="card-author">${esc(b.author) || 'Autor desconhecido'}</div>
        </div>
        <button class="btn btn-danger" onclick="remove(${b._i})">✕</button>
      </div>
      <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="card-footer">
        <span style="font-size:.78rem;color:var(--muted)">${b.current} / ${b.pages || '?'} pág.</span>
        <span class="pct">${pct}%</span>
        <button class="btn btn-ghost btn-sm" onclick="openModal(${b._i})">Atualizar</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', render);

// ===== REMOVE =====
function remove(i) {
  if (!confirm('Remover "' + db.books[i].title + '"?')) return;
  db.books.splice(i, 1);
  save();
  render();
  updateStats();
}

// ===== MODAL =====
function openModal(i) {
  editingIndex = i;
  document.getElementById('modalPage').value = db.books[i].current || 0;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingIndex = -1;
}
function saveUpdate() {
  if (editingIndex < 0) return;
  db.books[editingIndex].current = +document.getElementById('modalPage').value || 0;
  save();
  render();
  closeModal();
}
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ===== STREAK =====
function updateStreak() {
  const today = new Date().toDateString();
  if (db.stats.last !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (db.stats.last !== yesterday) db.stats.streak = 0;
    db.stats.streak = (db.stats.streak || 0) + 1;
    db.stats.last = today;
    save();
  }
}

// ===== STATS =====
function updateStats() {
  const total = db.books.length;
  const done  = db.books.filter(b => b.pages && b.current >= b.pages).length;
  const pages = db.books.reduce((s, b) => s + (b.current || 0), 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box"><div class="stat-val">${total}</div><div class="stat-label">Livros</div></div>
    <div class="stat-box"><div class="stat-val">${done}</div><div class="stat-label">Concluídos</div></div>
    <div class="stat-box"><div class="stat-val">${pages}</div><div class="stat-label">Páginas lidas</div></div>
    <div class="stat-box"><div class="stat-val">${db.stats.streak || 0}🔥</div><div class="stat-label">Dias seguidos</div></div>
  `;
  drawChart();
}

// ===== CHART =====
function drawChart() {
  const c = document.getElementById('chart');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = c.clientWidth || 300;
  const h = 140;
  c.width = w * dpr;
  c.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const books = db.books.slice(-8);
  if (!books.length) return;

  const barW = Math.min(30, (w - 20) / books.length - 8);
  const maxVal = Math.max(...books.map(b => b.pages || 0), 10);
  const pad = 20;

  books.forEach((b, i) => {
    const x = pad + i * ((w - pad * 2) / books.length) + (((w - pad * 2) / books.length) - barW) / 2;
    const fullH = ((b.pages || 0) / maxVal) * (h - 30);
    const readH = ((b.current || 0) / maxVal) * (h - 30);

    // unread
    ctx.fillStyle = '#2e2820';
    ctx.beginPath();
    ctx.roundRect(x, h - 20 - fullH, barW, fullH, 4);
    ctx.fill();

    // read
    ctx.fillStyle = '#c8a96e';
    ctx.beginPath();
    ctx.roundRect(x, h - 20 - readH, barW, readH, 4);
    ctx.fill();

    // label
    ctx.fillStyle = '#7a6e5a';
    ctx.font = '9px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    const label = b.title.length > 6 ? b.title.slice(0, 5) + '…' : b.title;
    ctx.fillText(label, x + barW / 2, h - 5);
  });
}

// ===== GOAL =====
function setGoal() {
  db.goal = +document.getElementById('goal').value || 1;
  save();
  updateGoal();
}

function updateGoal() {
  const done = db.books.filter(b => b.pages && b.current >= b.pages).length;
  const g    = db.goal || 1;
  const pct  = Math.min(Math.round(done / g * 100), 100);
  document.getElementById('goal').value = g;
  document.getElementById('goalTrack').innerHTML = `
    <div class="goal-ratio">${done} / ${g}</div>
    <div class="goal-desc">livros concluídos esta semana</div>
    <div style="margin-top:.8rem">
      <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div style="font-size:.78rem;color:var(--muted);margin-top:.4rem">${pct}% da meta semanal</div>
  `;
}

// ===== UTILS =====
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== PWA =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(
    URL.createObjectURL(new Blob([`
      const CACHE = 'leituras-v1';
      self.addEventListener('install', e => e.waitUntil(caches.open(CACHE)));
      self.addEventListener('fetch', e => {
        e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
      });
    `], { type: 'text/javascript' }))
  ).catch(() => {});
}
</script>
</body>
</html>
