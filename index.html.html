<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#7c3aed">
<title>Leituras</title>

<style>
:root{
  --bg:#0f0f10;
  --card:rgba(255,255,255,0.05);
  --accent:#7c3aed;
  --text:#f5f5f5;
  --sub:#a1a1aa;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#0f0f10,#1a1a1d);
  color:var(--text);
}

/* views */
.view{
  display:none;
  padding:1.2rem;
  padding-bottom:90px;
}
.view.active{
  display:block;
  animation:fade .25s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1}
}

/* cards */
.card{
  background:var(--card);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:1rem;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
  transition:.2s;
}

.card:active{
  transform:scale(0.98);
}

/* inputs */
input{
  width:100%;
  padding:.8rem;
  margin:.3rem 0;
  border:none;
  border-radius:12px;
  background:#1f1f23;
  color:white;
}

/* buttons */
button{
  width:100%;
  padding:.8rem;
  margin:.3rem 0;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  font-weight:600;
  transition:.15s;
}

button:active{
  transform:scale(0.95);
}

/* progress */
progress{
  width:100%;
  height:8px;
}

progress::-webkit-progress-value{
  background:linear-gradient(90deg,#7c3aed,#a78bfa);
}

/* nav */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:rgba(20,20,25,0.9);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.05);
}

.bottom button{
  background:none;
  font-size:20px;
  color:var(--sub);
}

.bottom button.active{
  color:white;
  transform:scale(1.2);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="view active" style="display:flex;flex-direction:column;justify-content:center;height:100vh">
  <h1>📚 Leituras</h1>
  <p style="color:var(--sub)">A tua biblioteca inteligente</p>
  <input id="user" placeholder="Nome">
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="view">
  <h2>Biblioteca</h2>
  <div id="books"></div>

  <h3>Adicionar</h3>
  <input id="title" placeholder="Título">
  <input id="pages" type="number" placeholder="Páginas">
  <button onclick="add()">Adicionar</button>
</div>

<!-- STATS -->
<div id="stats" class="view">
  <h2>Progresso</h2>
  <div id="statsBox"></div>
</div>

<!-- GAME -->
<div id="game" class="view">
  <h2>Nível</h2>
  <div id="gameBox"></div>
</div>

<!-- NAV -->
<nav class="bottom">
  <button onclick="nav('app',this)">📚</button>
  <button onclick="nav('stats',this)">📊</button>
  <button onclick="nav('game',this)">🎮</button>
</nav>

<script>

let db={}, user="";

// LOGIN
function login(){
  user = userInput.value;
  if(!user) return;

  db = JSON.parse(localStorage.getItem(user) || '{"books":[],"xp":0,"level":1}');
  show('app');
  render();
  update();
}

// NAV ACTIVE
function nav(view,el){
  document.querySelectorAll('.bottom button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  show(view);
}

// SAVE
function save(){
  localStorage.setItem(user, JSON.stringify(db));
}

// SHOW
function show(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById(v).classList.add('active');
}

// ADD
function add(){
  let b = {title:title.value,pages:+pages.value||0,current:0,last:new Date().toDateString()};
  if(!b.title) return;

  db.books.push(b);
  gainXP(10);
  save();
  render();
}

// RENDER
function render(){
  books.innerHTML="";
  db.books.forEach((b,i)=>{
    let p=b.pages?Math.round(b.current/b.pages*100):0;

    books.innerHTML+=`
    <div class="card">
      <div style="font-size:18px;font-weight:600">${b.title}</div>
      <progress value="${p}" max="100"></progress>
      <div style="font-size:12px;color:var(--sub)">${p}% concluído</div>
      <button onclick="read(${i})">Continuar</button>
      <button onclick="remove(${i})" style="background:#27272a">Remover</button>
    </div>`;
  });
}

// READ
function read(i){
  db.books[i].current+=10;
  db.books[i].last=new Date().toDateString();
  gainXP(5);
  save();
  render();
  update();
}

// REMOVE
function remove(i){
  db.books.splice(i,1);
  save();
  render();
}

// XP
function gainXP(x){
  db.xp+=x;
  if(db.xp>=db.level*50){db.xp=0;db.level++;}
}

// STATS
function update(){
  statsBox.innerHTML=`Livros: ${db.books.length}<br>Nível: ${db.level}<br>XP: ${db.xp}`;
  gameBox.innerHTML=`<h1>Nível ${db.level}</h1>`;
}

</script>

</body>
</html>
